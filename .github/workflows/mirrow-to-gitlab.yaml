name: Mirror to GitLab

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_MIRROR_TOKEN }}
        run: |
          git remote add gitlab \
            "https://oauth2:${GITLAB_TOKEN}@gitlab.com/walkcat-mirrow/contracts.git"
          git push gitlab HEAD:${GITHUB_REF#refs/heads/} --force